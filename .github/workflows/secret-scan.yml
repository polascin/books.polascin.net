name: Secret Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  secret-scan:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history needed for log -p

      - name: Scan pushed commits for secrets
        shell: bash
        run: |
          set +e  # allow grep to return non-zero without aborting

          # Patterns match the local pre-commit / pre-push hooks exactly.
          PATTERNS=(
            'DB_PASS=[^$#[:space:]]'
            'DB_PASSWORD=[^$#[:space:]]'
            'API_KEY=[^$#[:space:]]'
            'API_SECRET=[^$#[:space:]]'
            'SECRET_KEY=[^$#[:space:]]'
            'AUTH_TOKEN=[^$#[:space:]]'
            'ACCESS_TOKEN=[^$#[:space:]]'
            'PRIVATE_KEY=[^$#[:space:]]'
            'BEGIN [A-Z]+ PRIVATE KEY'
            'AKIA[0-9A-Z]{16}'
            'AIza[0-9A-Za-z_-]{35}'
            'ghp_[A-Za-z0-9]{36}'
            'github_pat_[A-Za-z0-9_]{82}'
            'sk_live_[A-Za-z0-9]{20,}'
            'xox[baprs]-[0-9A-Za-z_-]{10,}'
          )

          # Determine the diff range.
          if [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            if echo "$BEFORE" | grep -qE '^0+$'; then
              # Brand-new branch – scan all commits reachable from HEAD only.
              DIFF=$(git log -p --no-merges "$AFTER" | grep '^+' | grep -v '^+++')
            else
              DIFF=$(git log -p --no-merges "${BEFORE}..${AFTER}" | grep '^+' | grep -v '^+++')
            fi
          else
            # Pull request
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            DIFF=$(git log -p --no-merges "${BASE_SHA}..${HEAD_SHA}" | grep '^+' | grep -v '^+++')
          fi

          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            MATCH=$(echo "$DIFF" | grep -m1 -E "$pattern" | head -c 200)
            if [ -n "$MATCH" ]; then
              echo "::error::Potential secret detected matching pattern '${pattern}': ${MATCH}"
              FOUND=1
            fi
          done

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "Secret scan FAILED."
            echo "  1. Remove the secret value from the source file."
            echo "  2. Rotate the credential immediately."
            echo "  3. Rewrite history with:  git filter-branch or git-filter-repo"
            echo "  4. Force-push the cleaned branch."
            exit 1
          fi

          echo "Secret scan passed – no patterns matched."
